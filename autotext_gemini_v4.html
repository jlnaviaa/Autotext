<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoText CRUD - Gemini V4</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .container { max-width: 1400px; }
        #template-text, #generated-text { height: 250px; }
        .card-body .text-muted {
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #new-var-options-group { display: none; }
    </style>
</head>
<body>
    <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3"></div>

    <div class="container mt-4">
        <header class="text-center mb-4">
            <h1>Editor de Plantillas AutoText (v4)</h1>
            <p class="lead">Soporte para listas desplegables (select).</p>
        </header>

        <div class="row">
            <!-- Columna Izquierda -->
            <div class="col-lg-5">
                <div class="card mb-3">
                    <div class="card-header"><h4><i class="bi bi-folder2-open"></i> Gestión de Plantillas</h4></div>
                    <div class="card-body">
                        <div class="input-group mb-3">
                            <select id="template-select" class="form-select" title="Selecciona una plantilla"></select>
                            <button id="load-template-btn" class="btn btn-primary">Cargar</button>
                        </div>
                        <div class="input-group">
                             <input type="text" id="new-template-name" class="form-control" placeholder="Nombre de la nueva plantilla">
                             <button id="create-template-btn" class="btn btn-success">Crear</button>
                        </div>
                         <button id="delete-template-btn" class="btn btn-danger mt-2 w-100">Eliminar Plantilla</button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header"><h4><i class="bi bi-input-cursor-text"></i> Rellenar Variables</h4></div>
                    <div id="variables-form" class="card-body">
                        <p class="text-muted">Carga una plantilla para rellenar sus variables.</p>
                    </div>
                </div>
            </div>

            <!-- Columna Derecha -->
            <div class="col-lg-7">
                <div class="card mb-3">
                    <div class="card-header">
                        <ul class="nav nav-tabs card-header-tabs" id="editor-tabs" role="tablist">
                            <li class="nav-item" role="presentation"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#text-editor" type="button">Editor de Texto</button></li>
                            <li class="nav-item" role="presentation"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#vars-config" type="button">Configurar Variables</button></li>
                        </ul>
                    </div>
                    <div class="card-body tab-content">
                        <div class="tab-pane fade show active" id="text-editor" role="tabpanel">
                            <p class="form-text">Usa <code>{{id_variable}}</code> para insertar el valor de una variable.</p>
                            <textarea id="template-text" class="form-control" placeholder="Escribe aquí tu plantilla..."></textarea>
                        </div>
                        <div class="tab-pane fade" id="vars-config" role="tabpanel">
                            <div id="variables-list" class="mb-3"></div>
                            <div class="card bg-light p-3">
                                <h5>Añadir Nueva Variable</h5>
                                <div class="row g-2">
                                    <div class="col-md-6"><input type="text" id="new-var-id" class="form-control" placeholder="ID (sin espacios)"></div>
                                    <div class="col-md-6"><input type="text" id="new-var-label" class="form-control" placeholder="Etiqueta (label)"></div>
                                </div>
                                <div class="row g-2 mt-1">
                                    <div class="col-md-6">
                                        <select id="new-var-type" class="form-select">
                                            <option value="text">Texto Corto</option>
                                            <option value="textarea">Texto Largo</option>
                                            <option value="number">Número</option>
                                            <option value="date">Fecha</option>
                                            <option value="select">Lista (select)</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6" id="new-var-options-group">
                                        <input type="text" id="new-var-options" class="form-control" placeholder="Opciones separadas por coma">
                                    </div>
                                </div>
                                <button id="add-var-btn" class="btn btn-secondary btn-sm mt-2">Añadir Variable</button>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer">
                         <button id="save-template-btn" class="btn btn-info w-100">Guardar Cambios en Plantilla</button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header"><h4><i class="bi bi-file-earmark-text"></i> Resultado Generado</h4></div>
                    <div class="card-body">
                        <textarea id="generated-text" class="form-control" readonly></textarea>
                        <button id="copy-text-btn" class="btn btn-secondary mt-2 w-100">Copiar Texto</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        // --- ELEMENTOS DEL DOM ---
        const templateSelect = document.getElementById('template-select');
        const loadTemplateBtn = document.getElementById('load-template-btn');
        const newTemplateNameInput = document.getElementById('new-template-name');
        const createTemplateBtn = document.getElementById('create-template-btn');
        const deleteTemplateBtn = document.getElementById('delete-template-btn');
        const variablesForm = document.getElementById('variables-form');
        const templateTextArea = document.getElementById('template-text');
        const saveTemplateBtn = document.getElementById('save-template-btn');
        const generatedTextArea = document.getElementById('generated-text');
        const copyTextBtn = document.getElementById('copy-text-btn');
        const variablesList = document.getElementById('variables-list');
        const addVarBtn = document.getElementById('add-var-btn');
        const newVarIdInput = document.getElementById('new-var-id');
        const newVarLabelInput = document.getElementById('new-var-label');
        const newVarTypeInput = document.getElementById('new-var-type');
        const newVarOptionsGroup = document.getElementById('new-var-options-group');
        const newVarOptionsInput = document.getElementById('new-var-options');
        const toastContainer = document.getElementById('toast-container');

        // --- ESTADO DE LA APLICACIÓN ---
        let appData = { templates: {}, currentTemplate: null, variableValues: {} };

        // --- LÓGICA DE NOTIFICACIONES ---
        const showToast = (message, type = 'success') => {
            const toastEl = document.createElement('div');
            toastEl.className = `toast align-items-center text-bg-${type} border-0`;
            toastEl.innerHTML = `<div class="d-flex"><div class="toast-body">${message}</div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div>`;
            toastContainer.appendChild(toastEl);
            const toast = new bootstrap.Toast(toastEl, { delay: 3000 });
            toast.show();
            toastEl.addEventListener('hidden.bs.toast', () => toastEl.remove());
        };
        
        // --- GESTIÓN DE ESTADO ---
        const saveState = () => localStorage.setItem('autoTextData_v4', JSON.stringify({ templates: appData.templates, variableValues: appData.variableValues }));
        const loadState = () => {
            const savedData = localStorage.getItem('autoTextData_v4');
            if (savedData) {
                const data = JSON.parse(savedData);
                appData.templates = data.templates || {};
                appData.variableValues = data.variableValues || {};
                updateTemplateList();
            }
        };

        // --- RENDERIZADO DE UI ---
        const updateTemplateList = () => {
            templateSelect.innerHTML = '';
            const names = Object.keys(appData.templates);
            if (names.length === 0) {
                templateSelect.innerHTML = '<option disabled selected>No hay plantillas</option>';
            } else {
                names.forEach(name => templateSelect.add(new Option(name, name)));
            }
            templateSelect.value = appData.currentTemplate || '';
        };

        const generateText = () => {
            if (!appData.currentTemplate) return;
            let tpl = appData.templates[appData.currentTemplate];
            let generatedString = tpl.text;
            tpl.variables.forEach(v => {
                generatedString = generatedString.replace(new RegExp(`{{${v.id}}}`, 'g'), appData.variableValues[v.id] || '');
            });
            generatedTextArea.value = generatedString;
        };

        const renderVariablesForm = () => {
            variablesForm.innerHTML = '';
            if (!appData.currentTemplate) {
                variablesForm.innerHTML = '<p class="text-muted">Carga una plantilla para rellenar.</p>';
                return;
            }
            const variables = appData.templates[appData.currentTemplate].variables || [];
            if (variables.length === 0) {
                variablesForm.innerHTML = '<p class="text-muted">Esta plantilla no tiene variables definidas.</p>';
                return;
            }

            variables.forEach(varDef => {
                const group = document.createElement('div');
                group.className = 'mb-2';
                const label = document.createElement('label');
                label.className = 'form-label';
                label.textContent = varDef.label;
                group.appendChild(label);
                
                let field;
                if (varDef.type === 'textarea') {
                    field = document.createElement('textarea');
                    field.rows = 3;
                } else if (varDef.type === 'select') {
                    field = document.createElement('select');
                    varDef.options.forEach(opt => field.add(new Option(opt, opt)));
                } else {
                    field = document.createElement('input');
                    field.type = varDef.type;
                }
                field.className = 'form-control';
                field.id = `var-input-${varDef.id}`;
                field.dataset.varId = varDef.id;
                field.value = appData.variableValues[varDef.id] || '';

                group.appendChild(field);
                variablesForm.appendChild(group);
            });
            generateText();
        };

        const renderVariablesConfig = () => {
            variablesList.innerHTML = '';
            if (!appData.currentTemplate) return;
            (appData.templates[appData.currentTemplate].variables || []).forEach((v, i) => {
                const item = document.createElement('div');
                item.className = 'd-flex justify-content-between align-items-center p-2 border-bottom';
                let optionsHtml = v.type === 'select' ? `<br><small class="text-muted">Opciones: ${v.options.join(', ')}</small>` : '';
                item.innerHTML = `<span><code class="me-2">{{${v.id}}}</code><strong>${v.label}</strong><small class="text-muted ms-2">(${v.type})</small>${optionsHtml}</span>
                                  <button class="btn btn-outline-danger btn-sm delete-var-btn" data-index="${i}"><i class="bi bi-trash"></i></button>`;
                variablesList.appendChild(item);
            });
        };
        
        // --- MANEJADORES DE EVENTOS ---
        createTemplateBtn.addEventListener('click', () => {
            const name = newTemplateNameInput.value.trim();
            if (name && !appData.templates[name]) {
                appData.templates[name] = { text: `Hola, {{nombre}}. Su diagnóstico es {{diag}}.`, variables: [
                    {id: 'nombre', label: 'Nombre Paciente', type: 'text'},
                    {id: 'diag', label: 'Diagnóstico', type: 'select', options: ['Miopía', 'Hipermetropía', 'Astigmatismo']}
                ]};
                appData.currentTemplate = name;
                newTemplateNameInput.value = '';
                saveState();
                updateTemplateList();
                loadTemplateBtn.click();
                showToast(`Plantilla "${name}" creada.`);
            } else if (appData.templates[name]) {
                showToast('Ya existe una plantilla con ese nombre.', 'warning');
            }
        });

        loadTemplateBtn.addEventListener('click', () => {
            const name = templateSelect.value;
            if (name && appData.templates[name]) {
                appData.currentTemplate = name;
                const tpl = appData.templates[name];
                templateTextArea.value = tpl.text;
                if(!tpl.variables) tpl.variables = [];
                renderVariablesConfig();
                renderVariablesForm();
                templateTextArea.focus();
                showToast(`Plantilla "${name}" cargada.`);
            }
        });
        
        saveTemplateBtn.addEventListener('click', () => {
            if (appData.currentTemplate) {
                appData.templates[appData.currentTemplate].text = templateTextArea.value;
                saveState();
                generateText();
                showToast('Plantilla guardada.');
            } else {
                showToast('No hay plantilla cargada.', 'warning');
            }
        });

        deleteTemplateBtn.addEventListener('click', () => {
            const name = templateSelect.value;
            if (name && confirm(`¿Seguro que quieres eliminar "${name}"?`)) {
                delete appData.templates[name];
                appData.currentTemplate = null;
                templateTextArea.value = '';
                generatedTextArea.value = '';
                renderVariablesConfig();
                renderVariablesForm();
                updateTemplateList();
                saveState();
                showToast(`Plantilla "${name}" eliminada.`, 'danger');
            }
        });

        newVarTypeInput.addEventListener('change', () => {
            newVarOptionsGroup.style.display = newVarTypeInput.value === 'select' ? 'block' : 'none';
        });

        addVarBtn.addEventListener('click', () => {
            if (!appData.currentTemplate) { showToast('Carga una plantilla primero.', 'warning'); return; }
            const id = newVarIdInput.value.trim().replace(/\s+/g, '_');
            const label = newVarLabelInput.value.trim();
            const type = newVarTypeInput.value;
            if (!id || !label) { showToast('El ID y la Etiqueta son obligatorios.', 'warning'); return; }

            const vars = appData.templates[appData.currentTemplate].variables;
            if (vars.some(v => v.id === id)) { showToast(`ID de variable "${id}" ya existe.`, 'warning'); return; }

            const newVar = { id, label, type };
            if (type === 'select') {
                const options = newVarOptionsInput.value.split(',').map(s => s.trim()).filter(Boolean);
                if (options.length === 0) { showToast('Las listas deben tener opciones.', 'warning'); return; }
                newVar.options = options;
            }
            
            vars.push(newVar);
            [newVarIdInput, newVarLabelInput, newVarOptionsInput].forEach(i => i.value = '');
            renderVariablesConfig();
            renderVariablesForm();
            saveState();
            showToast(`Variable {{${id}}} añadida.`);
        });

        variablesList.addEventListener('click', (e) => {
            const btn = e.target.closest('.delete-var-btn');
            if (btn) {
                appData.templates[appData.currentTemplate].variables.splice(btn.dataset.index, 1);
                renderVariablesConfig();
                renderVariablesForm();
                saveState();
                showToast('Variable eliminada.', 'danger');
            }
        });

        variablesForm.addEventListener('input', (e) => {
            const id = e.target.dataset.varId;
            if (id) {
                appData.variableValues[id] = e.target.value;
                generateText();
            }
        });
        
        document.getElementById('editor-tabs').addEventListener('shown.bs.tab', saveState);
        loadTemplateBtn.addEventListener('click', saveState);

        copyTextBtn.addEventListener('click', () => {
            if (!generatedTextArea.value) { showToast('No hay texto que copiar.', 'secondary'); return; }
            navigator.clipboard.writeText(generatedTextArea.value).then(() => showToast('Texto copiado.'),
              () => showToast('Error al copiar.', 'danger'));
        });

        // --- INICIALIZACIÓN ---
        loadState();
    });
    </script>
</body>
</html>
