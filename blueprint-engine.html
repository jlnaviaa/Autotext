<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blueprint Oftalmología - CRUD de Plantillas Clínicas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .preview-container em { color: #3b82f6; font-style: normal; font-weight: bold; }
        .code-editor { font-family: 'Fira Code', Consolas, monospace; }
        /* Custom scrollbar para los paneles */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 h-screen overflow-hidden flex flex-col font-sans">

    <!-- Header / Navbar -->
    <header class="h-16 border-b border-slate-700 bg-slate-800 flex justify-between items-center px-6 shrink-0">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold text-emerald-400 flex items-center gap-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                Blueprint Engine <span class="text-xs font-mono text-slate-400 border border-slate-600 px-1 rounded bg-slate-900">Med-Oftalmo</span>
            </h1>
        </div>
        <div class="space-x-3 flex items-center">
            <span id="toast-msg" class="text-sm text-green-400 opacity-0 transition-opacity duration-300">¡Acción exitosa!</span>
            <button onclick="toggleCSVModal()" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded text-sm font-medium transition flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                Importar/Exportar CSV
            </button>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden h-full">
        <!-- Panel 1: Variables (CRUD) -->
        <aside class="w-1/3 min-w-[300px] border-r border-slate-700 flex flex-col bg-slate-800/50">
            <div class="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-800 shrink-0">
                <h2 class="text-sm font-bold uppercase tracking-wider text-slate-300">Variables (Examen)</h2>
                <button onclick="addVariable()" class="text-xs bg-emerald-600 text-white p-1 px-3 rounded hover:bg-emerald-500 transition shadow">+ Nueva Variable</button>
            </div>
            <div id="variables-container" class="flex-1 overflow-y-auto p-4 space-y-4">
                <!-- Inyección dinámica de variables -->
            </div>
        </aside>

        <!-- Panel 2: Editor HTML/Template -->
        <section class="w-1/3 min-w-[300px] border-r border-slate-700 flex flex-col bg-slate-900">
            <div class="p-4 border-b border-slate-700 bg-slate-800 shrink-0 flex justify-between items-center">
                <h2 class="text-sm font-bold uppercase tracking-wider text-slate-300">Plantilla Clínica (HTML)</h2>
                <span class="text-xs text-slate-500">Usa {{id}} para inyectar</span>
            </div>
            <textarea id="blueprint-editor" oninput="renderPreview()" class="flex-1 p-5 bg-[#0f172a] text-emerald-200 code-editor text-sm outline-none resize-none leading-relaxed" spellcheck="false"></textarea>
        </section>

        <!-- Panel 3: Live Preview -->
        <section class="w-1/3 min-w-[300px] flex flex-col bg-slate-200 text-slate-900">
            <div class="p-4 border-b border-slate-300 bg-white shrink-0 shadow-sm z-10 flex justify-between items-center">
                <h2 class="text-sm font-bold uppercase tracking-wider text-slate-600">Vista Previa (Texto)</h2>
                <button onclick="copyToClipboard()" class="bg-emerald-600 hover:bg-emerald-500 text-white text-xs px-3 py-1.5 rounded flex items-center gap-1 transition shadow-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                    Copiar
                </button>
            </div>
            <div id="preview" class="flex-1 p-8 overflow-y-auto preview-container bg-slate-50 font-mono text-sm whitespace-pre-wrap text-slate-800">
                <!-- Renderizado dinámico -->
            </div>
        </section>
    </main>

    <!-- Modal para CSV -->
    <div id="csv-modal" class="fixed inset-0 bg-slate-900/80 hidden items-center justify-center z-50 backdrop-blur-sm">
        <div class="bg-slate-800 rounded-xl shadow-2xl w-[800px] border border-slate-700 overflow-hidden flex flex-col">
            <div class="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-800/80">
                <h3 class="font-bold text-lg">Interoperabilidad CSV (Datos Clínicos)</h3>
                <button onclick="toggleCSVModal()" class="text-slate-400 hover:text-white">&times;</button>
            </div>
            <div class="p-4 flex-1">
                <p class="text-xs text-slate-400 mb-2">Formato esperado: <code class="text-emerald-300">id, label, type, value, options(separadas por |)</code></p>
                <textarea id="csv-textarea" class="w-full h-64 bg-slate-900 text-slate-300 p-3 rounded code-editor text-sm outline-none border border-slate-700 focus:border-emerald-500" placeholder="id, label, type, value, options..."></textarea>
            </div>
            <div class="p-4 border-t border-slate-700 bg-slate-800/80 flex justify-between">
                <button onclick="generateCSV()" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded text-sm transition">Generar desde UI</button>
                <div class="space-x-2">
                    <button onclick="toggleCSVModal()" class="px-4 py-2 text-slate-400 hover:text-white text-sm transition">Cancelar</button>
                    <button onclick="importCSV()" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 rounded text-sm font-bold transition shadow-lg shadow-emerald-900/50">Cargar Variables</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Estado Inicial (Especializado: Examen Oftalmológico) ---
        let state = {
            variables: [
                { id: 'paciente_nombre', label: 'Nombre del Paciente', type: 'text', value: 'Ana María Osorio' },
                { id: 'fecha_examen', label: 'Fecha de Consulta', type: 'date', value: '2026-03-15' },
                { id: 'motivo_consulta', label: 'Motivo de Consulta', type: 'textarea', value: 'Disminución de agudeza visual en ojo derecho, visión borrosa de lejos desde hace 3 meses. No reporta dolor.' },
                { id: 'av_sc_od', label: 'AV sin corr. OD', type: 'text', value: '20/60' },
                { id: 'av_sc_oi', label: 'AV sin corr. OI', type: 'text', value: '20/20' },
                { id: 'av_cc_od', label: 'AV con corr. OD', type: 'text', value: '20/20' },
                { id: 'av_cc_oi', label: 'AV con corr. OI', type: 'text', value: '20/20' },
                { id: 'refraccion_od', label: 'Refracción OD', type: 'text', value: '-1.25 -0.50 x 180°' },
                { id: 'refraccion_oi', label: 'Refracción OI', type: 'text', value: 'Plano' },
                { id: 'pio_od', label: 'PIO OD (mmHg)', type: 'number', value: '14' },
                { id: 'pio_oi', label: 'PIO OI (mmHg)', type: 'number', value: '15' },
                { id: 'biomicroscopia', label: 'Biomicroscopía (SA)', type: 'textarea', value: 'Cornea clara y transparente, CA formada, iris s/a, cristalino transparente en AO.' },
                { id: 'fondo_ojo', label: 'Fondo de Ojo', type: 'textarea', value: 'Papila de bordes netos, coloración normal, excavación fisiológica 0.3. Mácula con brillo conservado AO.' },
                { id: 'diagnostico_principal', label: 'Diagnóstico', type: 'select', value: 'Miopía', options: ['Normal', 'Miopía', 'Hipermetropía', 'Astigmatismo', 'Presbicia', 'Catarata', 'Glaucoma', 'Ojo Seco'] },
                { id: 'plan_tratamiento', label: 'Plan y Tratamiento', type: 'textarea', value: '1. Se prescribe corrección óptica (Gafas).\n2. Uso de lágrimas artificiales 1 gota cada 8 horas.\n3. Control en 1 año o por urgencias.' }
            ],
            template: `HISTORIA CLÍNICA - EXAMEN VISUAL OFTALMOLÓGICO
--------------------------------------------------
Fecha de Consulta: {{fecha_examen}}
Paciente: {{paciente_nombre}}

MOTIVO DE CONSULTA
{{motivo_consulta}}

EXAMEN FÍSICO (Agudeza Visual y Refracción)
- AV sin corrección: OD {{av_sc_od}} | OI {{av_sc_oi}}
- AV con corrección: OD {{av_cc_od}} | OI {{av_cc_oi}}
- Refracción: OD {{refraccion_od}} | OI {{refraccion_oi}}
- PIO (mmHg): OD {{pio_od}} | OI {{pio_oi}}

BIOMICROSCOPÍA (SA)
{{biomicroscopia}}

FONDO DE OJO
{{fondo_ojo}}

IMPRESIÓN DIAGNÓSTICA
{{diagnostico_principal}}

PLAN Y TRATAMIENTO
{{plan_tratamiento}}`
        };

        // Inicialización
        document.getElementById('blueprint-editor').value = state.template;

        // --- Core: Motor de Renderizado ---
        function escapeHTML(str) {
            if (typeof str !== 'string') return str;
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag])
            );
        }

        function renderPreview() {
            const editorValue = document.getElementById('blueprint-editor').value;
            const preview = document.getElementById('preview');
            let html = editorValue;

            state.variables.forEach(v => {
                const regex = new RegExp(`{{${v.id}}}`, 'g');
                // Permitimos inyección directa de colores para estilos, escapamos lo demás
                const safeValue = v.type === 'color' ? v.value : escapeHTML(String(v.value));
                
                // Efecto visual si la variable está vacía
                const fallback = `<span class="bg-red-100 text-red-600 px-1 rounded border border-red-200 text-xs font-mono" title="Falta valor para ${v.label}">{{${v.id}}}</span>`;
                html = html.replace(regex, safeValue !== '' ? safeValue : fallback);
            });

            preview.innerHTML = html;
        }

        function buildUI() {
            const container = document.getElementById('variables-container');
            container.innerHTML = '';

            state.variables.forEach((v, index) => {
                const div = document.createElement('div');
                div.className = "p-4 bg-slate-900/50 rounded-xl border border-slate-700 shadow-sm transition-all hover:border-slate-500 group";
                
                let inputHtml = '';
                
                // Generador de inputs por tipo
                switch(v.type) {
                    case 'select':
                        const opts = v.options || [];
                        inputHtml = `<select onchange="updateVar(${index}, this.value)" class="w-full bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm text-slate-200 focus:border-emerald-500 focus:outline-none transition">
                            ${opts.map(opt => `<option value="${opt}" ${v.value === opt ? 'selected' : ''}>${opt}</option>`).join('')}
                        </select>`;
                        break;
                    case 'range':
                        inputHtml = `<div class="flex items-center gap-3">
                            <input type="range" min="0" max="100" value="${v.value}" oninput="updateVar(${index}, this.value); this.nextElementSibling.textContent=this.value+'%'" class="w-full accent-emerald-500">
                            <span class="text-xs font-mono text-emerald-400 w-10 text-right">${v.value}%</span>
                        </div>`;
                        break;
                    case 'color':
                        inputHtml = `<div class="flex items-center gap-2">
                            <input type="color" value="${v.value}" oninput="updateVar(${index}, this.value)" class="h-8 w-12 rounded cursor-pointer bg-slate-800 border border-slate-600">
                            <input type="text" value="${v.value}" oninput="updateVar(${index}, this.value); this.previousElementSibling.value=this.value" class="flex-1 bg-slate-800 border border-slate-600 rounded-lg px-3 py-1 text-sm font-mono text-slate-300">
                        </div>`;
                        break;
                    case 'textarea':
                        inputHtml = `<textarea oninput="updateVar(${index}, this.value)" class="w-full bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm text-slate-200 focus:border-emerald-500 focus:outline-none transition resize-y min-h-[60px]">${v.value}</textarea>`;
                        break;
                    default: // text, number, date
                        inputHtml = `<input type="${v.type}" value="${v.value}" oninput="updateVar(${index}, this.value)" 
                                     class="w-full bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm text-slate-200 focus:border-emerald-500 focus:outline-none transition">`;
                }

                div.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <label class="text-xs font-bold text-slate-300 uppercase tracking-wide block mb-1">${v.label}</label>
                            <code class="text-[10px] text-emerald-400 bg-emerald-900/30 px-1.5 py-0.5 rounded border border-emerald-800/50 select-all">{{${v.id}}}</code>
                        </div>
                        <button onclick="removeVar(${index})" class="text-slate-500 hover:text-red-400 text-xs opacity-0 group-hover:opacity-100 transition px-2 py-1 rounded hover:bg-slate-800" title="Eliminar variable">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                    ${inputHtml}
                `;
                container.appendChild(div);
            });
            renderPreview();
        }

        // --- Operaciones de Estado ---
        function updateVar(index, val) {
            state.variables[index].value = val;
            renderPreview();
        }

        function removeVar(index) {
            state.variables.splice(index, 1);
            buildUI();
        }

        function addVariable() {
            // Un modal simple vía prompt (se puede mejorar a UI custom)
            const input = prompt("Define la variable médica:\nFormato: id, Etiqueta, tipo (text/number/date/color/range/select/textarea)\nEj: refraccion_od, Refracción Ojo Derecho, text");
            if (!input) return;
            
            const parts = input.split(',').map(s => s.trim());
            const id = parts[0] ? parts[0].replace(/\s+/g, '_').toLowerCase() : 'var_' + Date.now();
            
            state.variables.push({
                id: id,
                label: parts[1] || id,
                type: parts[2] || 'text',
                value: '',
                options: []
            });
            buildUI();
            showToast("Variable médica añadida");
        }

        // --- Interoperabilidad CSV ---
        const modal = document.getElementById('csv-modal');
        const csvTextarea = document.getElementById('csv-textarea');

        function toggleCSVModal() {
            modal.classList.toggle('hidden');
            modal.classList.toggle('flex');
            if(!modal.classList.contains('hidden')) {
                generateCSV(); // Auto-poblar al abrir
            }
        }

        function generateCSV() {
            let csv = "id, label, type, value, options\n";
            state.variables.forEach(v => {
                const opts = v.options ? v.options.join('|') : '';
                // Escapar comillas si existieran en los valores
                const safeVal = String(v.value).replace(/"/g, '""');
                csv += `${v.id}, ${v.label}, ${v.type}, "${safeVal}", ${opts}\n`;
            });
            csvTextarea.value = csv;
        }

        function importCSV() {
            const lines = csvTextarea.value.split('\n');
            const newVars = [];
            
            // Empezamos en 1 asumiendo la línea 0 es cabecera
            for(let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if(!line) continue;
                
                // Regex simple para manejar comas dentro de comillas (básico)
                const parts = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                
                if (parts.length >= 3) {
                    const id = parts[0]?.trim();
                    const label = parts[1]?.trim();
                    const type = parts[2]?.trim().toLowerCase();
                    let value = parts[3]?.trim() || '';
                    
                    // Limpiar comillas iniciales y finales del valor si existen
                    if(value.startsWith('"') && value.endsWith('"')) {
                        value = value.substring(1, value.length - 1).replace(/""/g, '"');
                    }

                    const optionsStr = parts[4]?.trim() || '';
                    const options = optionsStr ? optionsStr.split('|').map(o=>o.trim()) : [];

                    newVars.push({ id, label, type, value, options });
                }
            }

            if(newVars.length > 0) {
                state.variables = newVars;
                buildUI();
                toggleCSVModal();
                showToast("CSV Clínico importado correctamente");
            } else {
                showToast("Error: Formato CSV inválido");
            }
        }

        function copyToClipboard() {
            const previewElement = document.getElementById('preview');
            // innerText captura el texto visible respetando los saltos de línea y omitiendo HTML interno
            const textToCopy = previewElement.innerText;
            
            const textarea = document.createElement('textarea');
            textarea.value = textToCopy;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            
            showToast("¡Texto copiado al portapapeles!");
        }

        function showToast(msg) {
            const toast = document.getElementById('toast-msg');
            toast.textContent = msg;
            toast.classList.remove('opacity-0');
            setTimeout(() => toast.classList.add('opacity-0'), 3000);
        }

        // --- Inicio de la App ---
        buildUI();

    </script>
</body>
</html>
