<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoText CRUD - Gemini V1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .container {
            max-width: 1200px;
        }
        #template-text, #generated-text {
            height: 250px;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <header class="text-center mb-4">
            <h1>Editor de Plantillas AutoText</h1>
            <p class="lead">Crea y gestiona tus plantillas de texto dinámicas.</p>
        </header>

        <div class="row">
            <!-- Columna de Gestión de Plantillas y Variables -->
            <div class="col-md-5">
                <!-- Selección de Plantilla -->
                <div class="card mb-3">
                    <div class="card-header">
                        <h4>Gestión de Plantillas</h4>
                    </div>
                    <div class="card-body">
                        <div class="input-group mb-3">
                            <select id="template-select" class="form-select"></select>
                            <button id="load-template-btn" class="btn btn-primary">Cargar</button>
                        </div>
                        <div class="input-group">
                             <input type="text" id="new-template-name" class="form-control" placeholder="Nombre de la nueva plantilla">
                             <button id="create-template-btn" class="btn btn-success">Crear</button>
                        </div>
                         <button id="delete-template-btn" class="btn btn-danger mt-2 w-100">Eliminar Plantilla Seleccionada</button>
                    </div>
                </div>

                <!-- Formulario de Variables -->
                <div class="card">
                    <div class="card-header">
                        <h4>Variables de la Plantilla</h4>
                    </div>
                    <div id="variables-form" class="card-body">
                        <p class="text-muted">Selecciona o crea una plantilla para ver sus variables.</p>
                    </div>
                </div>
            </div>

            <!-- Columna de Edición y Resultado -->
            <div class="col-md-7">
                <!-- Editor de Plantilla -->
                <div class="card mb-3">
                    <div class="card-header">
                        <h4>Texto Base de la Plantilla (Usa {{variable}})</h4>
                    </div>
                    <div class="card-body">
                        <textarea id="template-text" class="form-control"></textarea>
                         <button id="save-template-btn" class="btn btn-info mt-2 w-100">Guardar Cambios en Plantilla</button>
                    </div>
                </div>

                <!-- Texto Generado -->
                <div class="card">
                    <div class="card-header">
                        <h4>Resultado Generado</h4>
                    </div>
                    <div class="card-body">
                        <textarea id="generated-text" class="form-control" readonly></textarea>
                        <button id="copy-text-btn" class="btn btn-secondary mt-2 w-100">Copiar Texto</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // El código JavaScript para la funcionalidad CRUD irá aquí
    </script>
</body>
</html>
