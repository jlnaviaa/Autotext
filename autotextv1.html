<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoText</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .glass-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
        }

        .label-mini {
            @apply text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1 block;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .notification {
            transition: all 0.3s ease-in-out;
            transform: translate(-50%, 100px);
            opacity: 0;
        }
        .notification.show {
            transform: translate(-50%, 0);
            opacity: 1;
        }

        select, input, textarea {
            @apply border border-slate-200 rounded-lg text-sm outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-100 transition-all;
        }
    </style>
</head>
<body class="p-2 md:p-6">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
            <div>
                <h1 class="text-xl font-black text-slate-800 flex items-center gap-2">
                    <span class="bg-blue-600 text-white p-1.5 rounded-lg shadow-lg shadow-blue-200">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </span>
                    AutoText v1<span class="text-blue-600 underline decoration-blue-200 decoration-4"> Examen Clínico</span>
                </h1>
            </div>
            
            <div class="flex bg-slate-200 p-1 rounded-xl">
                <button id="btn-mode-gen" onclick="setMode('gen')" class="px-5 py-2 rounded-lg text-xs font-bold transition-all bg-white shadow-sm">GENERADOR</button>
                <button id="btn-mode-edit" onclick="setMode('edit')" class="px-5 py-2 rounded-lg text-xs font-bold transition-all text-slate-500 hover:text-slate-800">PLANTILLA</button>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- Panel de Controles -->
            <div class="lg:col-span-6 space-y-4">
                
                <div id="section-gen" class="glass-card p-5 rounded-2xl shadow-sm border-t-4 border-t-blue-500">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="font-bold text-slate-700 uppercase text-xs tracking-widest">Entrada de Datos Clínicos</h2>
                        <button onclick="resetForm()" class="text-[9px] bg-slate-100 hover:bg-red-50 text-slate-500 hover:text-red-600 px-3 py-1.5 rounded-full transition-colors font-bold uppercase">Limpiar Todo</button>
                    </div>

                    <div id="dynamic-form" class="space-y-6 max-h-[75vh] overflow-y-auto pr-3 custom-scrollbar">
                        <!-- Generación dinámica -->
                    </div>
                </div>

                <!-- Editor de Configuración -->
                <div id="section-edit" class="hidden glass-card p-5 rounded-2xl shadow-sm space-y-4">
                    <h2 class="font-bold text-slate-700">Edición de Estructura</h2>
                    <div>
                        <label class="label-mini">Texto de la Plantilla (Variables entre {{}})</label>
                        <textarea id="edit-template-text" rows="18" class="w-full p-4 bg-slate-50 text-xs font-mono"></textarea>
                    </div>
                    <button onclick="saveConfig()" class="w-full bg-slate-800 text-white font-bold py-3 rounded-xl hover:bg-black transition-all">Sincronizar Cambios</button>
                </div>
            </div>

            <!-- Panel de Resultado -->
            <div class="lg:col-span-6">
                <div class="glass-card p-5 rounded-2xl shadow-md sticky top-6 flex flex-col h-full min-h-[600px] border-2 border-blue-50">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="font-bold text-slate-700 flex items-center gap-2">
                            Vista Previa del Informe
                        </h2>
                        <span id="char-count" class="text-[10px] font-black text-blue-400 bg-blue-50 px-3 py-1 rounded-full">0 CARACTERES</span>
                    </div>

                    <textarea id="output-text" readonly class="flex-grow w-full p-6 bg-slate-50 border-0 rounded-2xl text-slate-900 text-[13px] font-mono leading-relaxed focus:outline-none resize-none" placeholder="Complete los campos..."></textarea>
                    
                    <div class="mt-5">
                        <button onclick="copyToClipboard()" class="w-full flex items-center justify-center gap-3 bg-blue-600 hover:bg-blue-700 text-white py-5 rounded-2xl font-black text-sm transition-all shadow-xl shadow-blue-100 active:scale-95 group">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 group-hover:rotate-12 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                            </svg>
                            COPIAR PARA PEGAR EN HISTORIA CLÍNICA
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="notification fixed bottom-10 left-1/2 bg-slate-900 text-white px-8 py-3 rounded-full shadow-2xl flex items-center gap-3 z-50 text-sm font-bold">
        <span id="toast-msg">¡Listo para pegar!</span>
    </div>

    <script>
        const DEFAULT_CONFIG = {
            template: `AGUDEZA VISUAL LEJOS
SIN CORRECCIÓN   Ojo derecho {{avl_sc_od}}   Ojo izquierdo {{avl_sc_oi}}   
CON CORRECCIÓN   Ojo derecho {{avl_cc_od}}   Ojo izquierdo {{avl_cc_oi}}

AGUDEZA VISUAL CERCA
SIN CORRECCIÓN   Ojo derecho {{avc_sc_od}}   Ojo izquierdo {{avc_sc_oi}}
CON CORRECCIÓN   Ojo derecho {{avc_cc_od}}   Ojo izquierdo {{avc_cc_oi}}

AUTORREFRACCIÓN Ojo derecho {{auto_od}}   Ojo izquierdo {{auto_oi}}

QUERATOMETRÍA  Ojo derecho {{quer_od}}   Ojo izquierdo {{quer_oi}}

REFRACCIÓN EN USO  Ojo derecho {{uso_od}}   Ojo izquierdo {{uso_oi}}


MOVIMIENTOS EXTRAOCULARES
{{mov_extra}}

EXAMEN EXTERNO
OJO DERECHO. {{ex_ext_od}} 
OJO IZQUIERDO. {{ex_ext_oi}}

POLO ANTERIOR
OJO DERECHO. Tiempo de ruptura de la película lagrimal {{but_od}} segundos. Conjuntiva sana. Córnea trasparente. Cámara anterior grado {{camara_od}}. Iris normal. Cristalino {{crist_od}} en posición anatómica.
OJO IZQUIERDO. Tiempo de ruptura de la película lagrimal {{but_oi}} segundos. Conjuntiva sana. Córnea trasparente. Cámara anterior grado {{camara_oi}}. Iris normal. Cristalino {{crist_oi}} en posición anatómica.

POLO POSTERIOR 
OJO DERECHO. Vítreo trasparente. Retina adherida. Vasculatura de aspecto normal. Excavación {{exc_od}}
OJO IZQUIERDO. Vítreo trasparente. Retina adherida. Vasculatura de aspecto normal. Excavación {{exc_oi}}

PRESION INTRAOCULAR 
OJO DERECHO {{pio_od}} mmHg       
OJO IZQUIERDO {{pio_oi}} mmHg`,
            groups: [
                {
                    title: "AV Lejos (OD / OI)",
                    fields: [
                        { id: 'avl_sc_od', label: 'Sin Corr. OD', type: 'select', options: ['20/20', '20/25', '20/30', '20/40', '20/50', '20/60', '20/70', '20/80', '20/100', '20/150', '20/200', '20/400', 'CD', 'MM', 'PL', 'NPL'] },
                        { id: 'avl_sc_oi', label: 'Sin Corr. OI', type: 'select', options: ['20/20', '20/25', '20/30', '20/40', '20/50', '20/60', '20/70', '20/80', '20/100', '20/150', '20/200', '20/400', 'CD', 'MM', 'PL', 'NPL'] },
                        { id: 'avl_cc_od', label: 'Con Corr. OD', type: 'select', options: ['20/20', '20/25', '20/30', '20/40', '20/50', '20/60', '20/70', '20/80', '20/100', '20/150', '20/200', '20/400', 'CD', 'MM', 'PL', 'NPL'] },
                        { id: 'avl_cc_oi', label: 'Con Corr. OI', type: 'select', options: ['20/20', '20/25', '20/30', '20/40', '20/50', '20/60', '20/70', '20/80', '20/100', '20/150', '20/200', '20/400', 'CD', 'MM', 'PL', 'NPL'] }
                    ]
                },
                {
                    title: "AV Cerca (OD / OI)",
                    fields: [
                        { id: 'avc_sc_od', label: 'SC - OD', type: 'select', options: ['J1', 'J1+', 'J2', 'J3', 'J4', 'J5', 'J6'] },
                        { id: 'avc_sc_oi', label: 'SC - OI', type: 'select', options: ['J1', 'J1+', 'J2', 'J3', 'J4', 'J5', 'J6'] },
                        { id: 'avc_cc_od', label: 'CC - OD', type: 'select', options: ['J1', 'J1+', 'J2', 'J3', 'J4', 'J5', 'J6'] },
                        { id: 'avc_cc_oi', label: 'CC - OI', type: 'select', options: ['J1', 'J1+', 'J2', 'J3', 'J4', 'J5', 'J6'] }
                    ]
                },
                {
                    title: "Instrumentación (OD / OI)",
                    fields: [
                        { id: 'auto_od', label: 'Autoref OD', type: 'text', placeholder: 'Ej: -1.00 -0.50 x 0' },
                        { id: 'auto_oi', label: 'Autoref OI', type: 'text', placeholder: 'Ej: -1.00 -0.50 x 0' },
                        { id: 'quer_od', label: 'Querat. OD', type: 'text', placeholder: 'Ej: 42.00/43.00x90' },
                        { id: 'quer_oi', label: 'Querat. OI', type: 'text', placeholder: 'Ej: 42.00/43.00x90' },
                        { id: 'uso_od', label: 'En uso OD', type: 'text', default: 'Neutro' },
                        { id: 'uso_oi', label: 'En uso OI', type: 'text', default: 'Neutro' }
                    ]
                },
                {
                    title: "Examen Motilidad y Externo",
                    fields: [
                        { id: 'mov_extra', label: 'Motilidad', type: 'text', default: 'Hirschberg centrado. Ducciones normal. Cover test negativo.' },
                        { id: 'ex_ext_od', label: 'Externo OD', type: 'text', default: 'Bordes libres normales. Pestañas bien. Puntos lagrimales normales.' },
                        { id: 'ex_ext_oi', label: 'Externo OI', type: 'text', default: 'Bordes libres normales. Pestañas bien. Puntos lagrimales normales.' }
                    ]
                },
                {
                    title: "Polo Anterior",
                    fields: [
                        { id: 'but_od', label: 'BUT OD (Seg)', type: 'text', default: '10' },
                        { id: 'but_oi', label: 'BUT OI (Seg)', type: 'text', default: '10' },
                        { id: 'camara_od', label: 'Cámara OD', type: 'select', options: ['IV', 'III', 'II', 'I'] },
                        { id: 'camara_oi', label: 'Cámara OI', type: 'select', options: ['IV', 'III', 'II', 'I'] },
                        { id: 'crist_od', label: 'Cristalino OD', type: 'text', default: 'N0C0P0' },
                        { id: 'crist_oi', label: 'Cristalino OI', type: 'text', default: 'N0C0P0' }
                    ]
                },
                {
                    title: "Posterior e Intraocular",
                    fields: [
                        { id: 'exc_od', label: 'Excav. OD', type: 'text', default: '0.3' },
                        { id: 'exc_oi', label: 'Excav. OI', type: 'text', default: '0.3' },
                        { id: 'pio_od', label: 'PIO OD (mmHg)', type: 'text', default: '14' },
                        { id: 'pio_oi', label: 'PIO OI (mmHg)', type: 'text', default: '14' }
                    ]
                }
            ]
        };

        let config = JSON.parse(localStorage.getItem('oftalmo_final_config_v2')) || DEFAULT_CONFIG;

        window.onload = () => {
            renderUI();
            updatePreview();
            document.getElementById('edit-template-text').value = config.template;
        };

        function setMode(mode) {
            const isGen = mode === 'gen';
            document.getElementById('section-gen').classList.toggle('hidden', !isGen);
            document.getElementById('section-edit').classList.toggle('hidden', isGen);
            document.getElementById('btn-mode-gen').className = isGen ? "px-5 py-2 rounded-lg text-xs font-bold transition-all bg-white shadow-sm" : "px-5 py-2 rounded-lg text-xs font-bold transition-all text-slate-500";
            document.getElementById('btn-mode-edit').className = !isGen ? "px-5 py-2 rounded-lg text-xs font-bold transition-all bg-white shadow-sm" : "px-5 py-2 rounded-lg text-xs font-bold transition-all text-slate-500";
        }

        function renderUI() {
            const container = document.getElementById('dynamic-form');
            container.innerHTML = '';

            config.groups.forEach(group => {
                const groupDiv = document.createElement('div');
                groupDiv.className = "mb-6";
                groupDiv.innerHTML = `<h3 class="label-mini mb-3 border-b border-slate-100 pb-1">${group.title}</h3>`;
                
                const grid = document.createElement('div');
                grid.className = "grid grid-cols-2 gap-4";

                group.fields.forEach(field => {
                    const wrap = document.createElement('div');
                    wrap.className = "flex flex-col";
                    
                    const label = document.createElement('label');
                    label.className = "text-[10px] font-bold text-slate-500 ml-1 mb-1";
                    label.innerText = field.label;
                    
                    let input;
                    if (field.type === 'select') {
                        input = document.createElement('select');
                        field.options.forEach(opt => {
                            const o = document.createElement('option');
                            o.value = opt; o.innerText = opt;
                            input.appendChild(o);
                        });
                    } else {
                        input = document.createElement('input');
                        input.type = 'text';
                        input.placeholder = field.placeholder || '';
                    }

                    input.id = `v-${field.id}`;
                    input.value = field.default || '';
                    input.className = "p-2.5 bg-white shadow-sm";
                    input.oninput = updatePreview;

                    wrap.appendChild(label);
                    wrap.appendChild(input);
                    grid.appendChild(wrap);
                });
                
                groupDiv.appendChild(grid);
                container.appendChild(groupDiv);
            });
        }

        function updatePreview() {
            let text = config.template;
            config.groups.forEach(g => {
                g.fields.forEach(f => {
                    const el = document.getElementById(`v-${f.id}`);
                    const val = el ? el.value : `[${f.id}]`;
                    text = text.replace(new RegExp(`{{${f.id}}}`, 'g'), val);
                });
            });

            const out = document.getElementById('output-text');
            out.value = text;
            document.getElementById('char-count').innerText = `${text.length} CARACTERES`;
        }

        async function copyToClipboard() {
            const text = document.getElementById('output-text').value;
            try {
                await navigator.clipboard.writeText(text);
                showToast("¡Texto copiado sin formato!");
            } catch (err) {
                const out = document.getElementById('output-text');
                out.select();
                document.execCommand('copy');
                showToast("Copiado con éxito");
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function resetForm() {
            config.groups.forEach(g => {
                g.fields.forEach(f => {
                    const el = document.getElementById(`v-${f.id}`);
                    if (el) el.value = f.default || '';
                });
            });
            updatePreview();
        }

        function saveConfig() {
            config.template = document.getElementById('edit-template-text').value;
            localStorage.setItem('oftalmo_final_config_v2', JSON.stringify(config));
            updatePreview();
            setMode('gen');
            showToast("Plantilla sincronizada");
        }
    </script>
</body>
</html>
