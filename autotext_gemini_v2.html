<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoText CRUD - Gemini V2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { max-width: 1200px; }
        #template-text, #generated-text { height: 250px; }
        .card-body .text-muted {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <header class="text-center mb-4">
            <h1>Editor de Plantillas AutoText</h1>
            <p class="lead">Crea y gestiona tus plantillas de texto dinámicas.</p>
        </header>

        <div class="row">
            <div class="col-md-5">
                <div class="card mb-3">
                    <div class="card-header"><h4>Gestión de Plantillas</h4></div>
                    <div class="card-body">
                        <div class="input-group mb-3">
                            <select id="template-select" class="form-select" title="Selecciona una plantilla"></select>
                            <button id="load-template-btn" class="btn btn-primary">Cargar</button>
                        </div>
                        <div class="input-group">
                             <input type="text" id="new-template-name" class="form-control" placeholder="Nombre de la nueva plantilla">
                             <button id="create-template-btn" class="btn btn-success">Crear</button>
                        </div>
                         <button id="delete-template-btn" class="btn btn-danger mt-2 w-100">Eliminar Plantilla</button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header"><h4>Variables de la Plantilla</h4></div>
                    <div id="variables-form" class="card-body">
                        <p class="text-muted">Carga una plantilla o crea una nueva.</p>
                    </div>
                </div>
            </div>

            <div class="col-md-7">
                <div class="card mb-3">
                    <div class="card-header"><h4>Texto Base de la Plantilla (Usa {{variable}})</h4></div>
                    <div class="card-body">
                        <textarea id="template-text" class="form-control" placeholder="Escribe aquí tu plantilla. Por ejemplo: Hola, mi nombre es {{nombre}} y vivo en {{ciudad}}."></textarea>
                         <button id="save-template-btn" class="btn btn-info mt-2 w-100">Guardar Cambios</button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header"><h4>Resultado Generado</h4></div>
                    <div class="card-body">
                        <textarea id="generated-text" class="form-control" readonly></textarea>
                        <button id="copy-text-btn" class="btn btn-secondary mt-2 w-100">Copiar Texto</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const templateSelect = document.getElementById('template-select');
        const loadTemplateBtn = document.getElementById('load-template-btn');
        const newTemplateNameInput = document.getElementById('new-template-name');
        const createTemplateBtn = document.getElementById('create-template-btn');
        const deleteTemplateBtn = document.getElementById('delete-template-btn');
        const variablesForm = document.getElementById('variables-form');
        const templateTextArea = document.getElementById('template-text');
        const saveTemplateBtn = document.getElementById('save-template-btn');
        const generatedTextArea = document.getElementById('generated-text');
        const copyTextBtn = document.getElementById('copy-text-btn');

        let appData = {
            templates: {},
            currentTemplate: null
        };

        const saveState = () => {
            localStorage.setItem('autoTextData', JSON.stringify(appData.templates));
        };

        const loadState = () => {
            const savedData = localStorage.getItem('autoTextData');
            if (savedData) {
                appData.templates = JSON.parse(savedData);
                updateTemplateList();
            }
        };

        const updateTemplateList = () => {
            templateSelect.innerHTML = '';
            const templateNames = Object.keys(appData.templates);
            if (templateNames.length === 0) {
                templateSelect.innerHTML = '<option disabled>No hay plantillas</option>';
            } else {
                templateNames.forEach(name => {
                    const option = new Option(name, name);
                    templateSelect.add(option);
                });
            }
            templateSelect.value = appData.currentTemplate;
        };

        const generateText = () => {
            if (!appData.currentTemplate) return;

            let templateString = appData.templates[appData.currentTemplate].text;
            const variables = appData.templates[appData.currentTemplate].variables;

            let generatedString = templateString;
            for (const key in variables) {
                const input = document.getElementById(`var-${key}`);
                if (input) {
                    variables[key] = input.value;
                    generatedString = generatedString.replace(new RegExp(`{{${key}}}`, 'g'), input.value);
                }
            }
            generatedTextArea.value = generatedString;
        };
        
        const renderVariables = () => {
            variablesForm.innerHTML = '';
            if (!appData.currentTemplate) {
                variablesForm.innerHTML = '<p class="text-muted">Carga una plantilla o crea una nueva.</p>';
                return;
            }

            const templateString = appData.templates[appData.currentTemplate].text;
            const foundVariables = templateString.match(/\{\{([a-zA-Z0-9_]+)\}\}/g) || [];
            const uniqueVariables = [...new Set(foundVariables.map(v => v.slice(2, -2)))];
            
            const currentVars = appData.templates[appData.currentTemplate].variables;
            const newVars = {};

            if (uniqueVariables.length === 0) {
                variablesForm.innerHTML = '<p class="text-muted">No se encontraron variables ({{variable}}) en la plantilla.</p>';
            }

            uniqueVariables.forEach(key => {
                newVars[key] = currentVars[key] || ''; // Preserve old value if exists
                
                const varGroup = document.createElement('div');
                varGroup.className = 'mb-2';
                
                const label = document.createElement('label');
                label.className = 'form-label';
                label.setAttribute('for', `var-${key}`);
                label.textContent = key;
                
                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'form-control';
                input.id = `var-${key}`;
                input.value = newVars[key];
                
                varGroup.appendChild(label);
                varGroup.appendChild(input);
                variablesForm.appendChild(varGroup);
            });
            
            appData.templates[appData.currentTemplate].variables = newVars;
            generateText();
        };

        createTemplateBtn.addEventListener('click', () => {
            const newName = newTemplateNameInput.value.trim();
            if (newName && !appData.templates[newName]) {
                appData.templates[newName] = { text: '', variables: {} };
                appData.currentTemplate = newName;
                newTemplateNameInput.value = '';
                updateTemplateList();
                loadTemplateBtn.click();
                saveState();
            } else if (appData.templates[newName]) {
                alert('Ya existe una plantilla con ese nombre.');
            }
        });

        loadTemplateBtn.addEventListener('click', () => {
            const selectedName = templateSelect.value;
            if (selectedName) {
                appData.currentTemplate = selectedName;
                templateTextArea.value = appData.templates[selectedName].text;
                renderVariables();
                templateTextArea.focus();
            }
        });
        
        saveTemplateBtn.addEventListener('click', () => {
            if (appData.currentTemplate) {
                appData.templates[appData.currentTemplate].text = templateTextArea.value;
                renderVariables();
                saveState();
                alert('Plantilla guardada.');
            } else {
                alert('No hay una plantilla cargada para guardar.');
            }
        });

        deleteTemplateBtn.addEventListener('click', () => {
            const selectedName = templateSelect.value;
            if (selectedName && confirm(`¿Estás seguro de que quieres eliminar la plantilla "${selectedName}"?`)) {
                delete appData.templates[selectedName];
                appData.currentTemplate = null;
                templateTextArea.value = '';
                generatedTextArea.value = '';
                renderVariables();
                updateTemplateList();
                saveState();
            }
        });

        copyTextBtn.addEventListener('click', () => {
            generatedTextArea.select();
            document.execCommand('copy');
            alert('Texto copiado al portapapeles.');
        });

        variablesForm.addEventListener('input', generateText);

        // Initial Load
        loadState();
    });
    </script>
</body>
</html>
