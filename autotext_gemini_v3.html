<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoText CRUD - Gemini V3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .container { max-width: 1400px; }
        #template-text, #generated-text { height: 250px; }
        .card-body .text-muted {
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3"></div>

    <div class="container mt-4">
        <header class="text-center mb-4">
            <h1>Editor de Plantillas AutoText (v3)</h1>
            <p class="lead">Gestión de variables mejorada.</p>
        </header>

        <div class="row">
            <!-- Columna Izquierda -->
            <div class="col-lg-5">
                <!-- Gestión de Plantillas -->
                <div class="card mb-3">
                    <div class="card-header"><h4><i class="bi bi-folder2-open"></i> Gestión de Plantillas</h4></div>
                    <div class="card-body">
                        <div class="input-group mb-3">
                            <select id="template-select" class="form-select" title="Selecciona una plantilla"></select>
                            <button id="load-template-btn" class="btn btn-primary">Cargar</button>
                        </div>
                        <div class="input-group">
                             <input type="text" id="new-template-name" class="form-control" placeholder="Nombre de la nueva plantilla">
                             <button id="create-template-btn" class="btn btn-success">Crear</button>
                        </div>
                         <button id="delete-template-btn" class="btn btn-danger mt-2 w-100">Eliminar Plantilla</button>
                    </div>
                </div>

                <!-- Formulario de Relleno -->
                <div class="card">
                    <div class="card-header"><h4><i class="bi bi-input-cursor-text"></i> Rellenar Variables</h4></div>
                    <div id="variables-form" class="card-body">
                        <p class="text-muted">Carga una plantilla para rellenar sus variables.</p>
                    </div>
                </div>
            </div>

            <!-- Columna Derecha -->
            <div class="col-lg-7">
                <!-- Editor y Configuración -->
                <div class="card mb-3">
                    <div class="card-header">
                        <ul class="nav nav-tabs card-header-tabs" id="editor-tabs" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active" id="text-editor-tab" data-bs-toggle="tab" data-bs-target="#text-editor" type="button" role="tab">Editor de Texto</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="vars-config-tab" data-bs-toggle="tab" data-bs-target="#vars-config" type="button" role="tab">Configurar Variables</button>
                            </li>
                        </ul>
                    </div>
                    <div class="card-body tab-content" id="editor-tabs-content">
                        <!-- Pestaña Editor de Texto -->
                        <div class="tab-pane fade show active" id="text-editor" role="tabpanel">
                            <p class="form-text">Usa <code>{{id_variable}}</code> para insertar el valor de una variable.</p>
                            <textarea id="template-text" class="form-control" placeholder="Escribe aquí tu plantilla..."></textarea>
                        </div>
                        <!-- Pestaña Configurar Variables -->
                        <div class="tab-pane fade" id="vars-config" role="tabpanel">
                            <div id="variables-list" class="mb-3"></div>
                            <div class="card bg-light p-3">
                                <h5>Añadir Nueva Variable</h5>
                                <div class="row g-2">
                                    <div class="col-md-4">
                                        <input type="text" id="new-var-id" class="form-control" placeholder="ID (sin espacios)">
                                    </div>
                                    <div class="col-md-4">
                                        <input type="text" id="new-var-label" class="form-control" placeholder="Etiqueta (label)">
                                    </div>
                                    <div class="col-md-4">
                                        <select id="new-var-type" class="form-select">
                                            <option value="text">Texto Corto</option>
                                            <option value="textarea">Texto Largo</option>
                                            <option value="number">Número</option>
                                            <option value="date">Fecha</option>
                                        </select>
                                    </div>
                                </div>
                                 <button id="add-var-btn" class="btn btn-secondary btn-sm mt-2">Añadir Variable</button>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer">
                         <button id="save-template-btn" class="btn btn-info w-100">Guardar Cambios en Plantilla</button>
                    </div>
                </div>

                <!-- Resultado -->
                <div class="card">
                    <div class="card-header"><h4><i class="bi bi-file-earmark-text"></i> Resultado Generado</h4></div>
                    <div class="card-body">
                        <textarea id="generated-text" class="form-control" readonly></textarea>
                        <button id="copy-text-btn" class="btn btn-secondary mt-2 w-100">Copiar Texto</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        // --- ELEMENTOS DEL DOM ---
        const templateSelect = document.getElementById('template-select');
        const loadTemplateBtn = document.getElementById('load-template-btn');
        const newTemplateNameInput = document.getElementById('new-template-name');
        const createTemplateBtn = document.getElementById('create-template-btn');
        const deleteTemplateBtn = document.getElementById('delete-template-btn');
        const variablesForm = document.getElementById('variables-form');
        const templateTextArea = document.getElementById('template-text');
        const saveTemplateBtn = document.getElementById('save-template-btn');
        const generatedTextArea = document.getElementById('generated-text');
        const copyTextBtn = document.getElementById('copy-text-btn');
        const variablesList = document.getElementById('variables-list');
        const addVarBtn = document.getElementById('add-var-btn');
        const newVarIdInput = document.getElementById('new-var-id');
        const newVarLabelInput = document.getElementById('new-var-label');
        const newVarTypeInput = document.getElementById('new-var-type');
        const toastContainer = document.getElementById('toast-container');

        // --- ESTADO DE LA APLICACIÓN ---
        let appData = {
            templates: {},
            currentTemplate: null,
            variableValues: {} // Almacena los valores de relleno independientemente de la plantilla
        };

        // --- LÓGICA DE NOTIFICACIONES ---
        const showToast = (message, type = 'success') => {
            const toastEl = document.createElement('div');
            toastEl.className = `toast align-items-center text-bg-${type} border-0`;
            toastEl.setAttribute('role', 'alert');
            toastEl.setAttribute('aria-live', 'assertive');
            toastEl.setAttribute('aria-atomic', 'true');
            toastEl.innerHTML = `<div class="d-flex"><div class="toast-body">${message}</div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button></div>`;
            toastContainer.appendChild(toastEl);
            const toast = new bootstrap.Toast(toastEl, { delay: 3000 });
            toast.show();
            toastEl.addEventListener('hidden.bs.toast', () => toastEl.remove());
        };
        
        // --- GESTIÓN DE ESTADO (localStorage) ---
        const saveState = () => {
            localStorage.setItem('autoTextData_v3', JSON.stringify({
                templates: appData.templates,
                variableValues: appData.variableValues
            }));
        };

        const loadState = () => {
            const savedData = localStorage.getItem('autoTextData_v3');
            if (savedData) {
                const data = JSON.parse(savedData);
                appData.templates = data.templates || {};
                appData.variableValues = data.variableValues || {};
                updateTemplateList();
            }
        };

        // --- RENDERIZADO DE UI ---
        const updateTemplateList = () => {
            templateSelect.innerHTML = '';
            const templateNames = Object.keys(appData.templates);
            if (templateNames.length === 0) {
                templateSelect.innerHTML = '<option disabled selected>No hay plantillas</option>';
            } else {
                templateNames.forEach(name => {
                    const option = new Option(name, name);
                    templateSelect.add(option);
                });
            }
            templateSelect.value = appData.currentTemplate || '';
        };

        const generateText = () => {
            if (!appData.currentTemplate) return;

            let templateString = appData.templates[appData.currentTemplate].text;
            let generatedString = templateString;
            
            appData.templates[appData.currentTemplate].variables.forEach(varDef => {
                const value = appData.variableValues[varDef.id] || '';
                generatedString = generatedString.replace(new RegExp(`{{${varDef.id}}}`, 'g'), value);
            });
            generatedTextArea.value = generatedString;
        };

        const renderVariablesForm = () => {
            variablesForm.innerHTML = '';
            if (!appData.currentTemplate) {
                variablesForm.innerHTML = '<p class="text-muted">Carga una plantilla para rellenar.</p>';
                return;
            }
            
            const variables = appData.templates[appData.currentTemplate].variables || [];
            if (variables.length === 0) {
                variablesForm.innerHTML = '<p class="text-muted">Esta plantilla no tiene variables definidas.</p>';
                return;
            }

            variables.forEach(varDef => {
                const group = document.createElement('div');
                group.className = 'mb-2';

                const label = document.createElement('label');
                label.className = 'form-label';
                label.setAttribute('for', `var-input-${varDef.id}`);
                label.textContent = varDef.label;

                let input;
                if(varDef.type === 'textarea') {
                    input = document.createElement('textarea');
                    input.rows = 3;
                } else {
                    input = document.createElement('input');
                    input.type = varDef.type;
                }
                input.className = 'form-control';
                input.id = `var-input-${varDef.id}`;
                input.dataset.varId = varDef.id;
                input.value = appData.variableValues[varDef.id] || '';
                
                group.appendChild(label);
                group.appendChild(input);
                variablesForm.appendChild(group);
            });
            generateText();
        };

        const renderVariablesConfig = () => {
            variablesList.innerHTML = '';
            if (!appData.currentTemplate) return;

            const variables = appData.templates[appData.currentTemplate].variables || [];
            variables.forEach((varDef, index) => {
                const item = document.createElement('div');
                item.className = 'd-flex justify-content-between align-items-center p-2 border-bottom';
                item.innerHTML = `
                    <span>
                        <code class="me-2">{{${varDef.id}}}</code>
                        <strong>${varDef.label}</strong>
                        <small class="text-muted ms-2">(${varDef.type})</small>
                    </span>
                    <button class="btn btn-outline-danger btn-sm delete-var-btn" data-index="${index}"><i class="bi bi-trash"></i></button>
                `;
                variablesList.appendChild(item);
            });
        };
        
        // --- MANEJADORES DE EVENTOS ---
        createTemplateBtn.addEventListener('click', () => {
            const newName = newTemplateNameInput.value.trim();
            if (newName && !appData.templates[newName]) {
                appData.templates[newName] = { text: `Hola, {{nombre}}.`, variables: [{id: 'nombre', label: 'Nombre', type: 'text'}] };
                appData.currentTemplate = newName;
                newTemplateNameInput.value = '';
                saveState();
                updateTemplateList();
                loadTemplateBtn.click();
                showToast(`Plantilla "${newName}" creada.`);
            } else if (appData.templates[newName]) {
                showToast('Ya existe una plantilla con ese nombre.', 'warning');
            }
        });

        loadTemplateBtn.addEventListener('click', () => {
            const selectedName = templateSelect.value;
            if (selectedName && appData.templates[selectedName]) {
                appData.currentTemplate = selectedName;
                const template = appData.templates[selectedName];
                templateTextArea.value = template.text;
                if(!template.variables) template.variables = [];

                renderVariablesConfig();
                renderVariablesForm();
                templateTextArea.focus();
                showToast(`Plantilla "${selectedName}" cargada.`);
            } else {
                showToast('Selecciona una plantilla válida para cargar.', 'secondary');
            }
        });
        
        saveTemplateBtn.addEventListener('click', () => {
            if (appData.currentTemplate) {
                appData.templates[appData.currentTemplate].text = templateTextArea.value;
                // Las variables se guardan al añadirlas/eliminarlas.
                saveState();
                generateText(); // Actualiza el resultado con el nuevo texto
                showToast('Plantilla guardada.');
            } else {
                showToast('No hay una plantilla cargada para guardar.', 'warning');
            }
        });

        deleteTemplateBtn.addEventListener('click', () => {
            const selectedName = templateSelect.value;
            if (selectedName && confirm(`¿Estás seguro de que quieres eliminar la plantilla "${selectedName}"?`)) {
                delete appData.templates[selectedName];
                appData.currentTemplate = null;
                templateTextArea.value = '';
                generatedTextArea.value = '';
                renderVariablesConfig();
                renderVariablesForm();
                updateTemplateList();
                saveState();
                showToast(`Plantilla "${selectedName}" eliminada.`, 'danger');
            }
        });

        addVarBtn.addEventListener('click', () => {
            if (!appData.currentTemplate) {
                showToast('Carga una plantilla primero.', 'warning');
                return;
            }
            const id = newVarIdInput.value.trim().replace(/\s+/g, '_');
            const label = newVarLabelInput.value.trim();
            const type = newVarTypeInput.value;

            if (id && label) {
                const variables = appData.templates[appData.currentTemplate].variables;
                if (variables.some(v => v.id === id)) {
                    showToast(`La variable con ID "${id}" ya existe.`, 'warning');
                    return;
                }
                variables.push({ id, label, type });
                newVarIdInput.value = '';
                newVarLabelInput.value = '';
                renderVariablesConfig();
                renderVariablesForm();
                saveState();
                showToast(`Variable {{${id}}} añadida.`);
            } else {
                showToast('El ID y la Etiqueta son obligatorios.', 'warning');
            }
        });

        variablesList.addEventListener('click', (e) => {
            if (e.target.closest('.delete-var-btn')) {
                const button = e.target.closest('.delete-var-btn');
                const index = parseInt(button.dataset.index, 10);
                appData.templates[appData.currentTemplate].variables.splice(index, 1);
                renderVariablesConfig();
                renderVariablesForm();
                saveState();
                showToast('Variable eliminada.', 'danger');
            }
        });

        variablesForm.addEventListener('input', (e) => {
            const varId = e.target.dataset.varId;
            if (varId) {
                appData.variableValues[varId] = e.target.value;
                generateText();
                // No guardamos en cada input para no sobrecargar localStorage,
                // pero podría ser una opción con debounce.
            }
        });
        
        // Guardar valores al cambiar de pestaña o de plantilla
        document.getElementById('editor-tabs').addEventListener('click', saveState);
        loadTemplateBtn.addEventListener('click', saveState);

        copyTextBtn.addEventListener('click', () => {
            if (!generatedTextArea.value) {
                showToast('No hay texto que copiar.', 'secondary');
                return;
            }
            navigator.clipboard.writeText(generatedTextArea.value).then(() => {
                showToast('Texto copiado al portapapeles.');
            }).catch(err => {
                showToast('Error al copiar el texto.', 'danger');
            });
        });

        // --- INICIALIZACIÓN ---
        loadState();
    });
    </script>
</body>
</html>
